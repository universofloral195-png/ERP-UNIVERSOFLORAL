<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universo Floral ERP Enterprise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --gold:#C9A86A; --gold-light:#E8D5B0; --gold-dark:#A8873F;
  --rose:#D8B4B6; --rose-light:#F0E0E1; --rose-dark:#B88A8C;
  --green:#6F8A75; --green-light:#A8C4AE; --green-dark:#4A6350;
  --ivory:#F8F5F0; --ivory-dark:#EDE9E2;
  --black:#1C1C1C; --black2:#2C2C2C;
  --gray1:#3D3D3D; --gray2:#5A5A5A; --gray3:#8A8A8A; --gray4:#BEBEBE; --gray5:#E8E5E0;
  --white:#FFFFFF;
  --sidebar-w:260px; --header-h:64px;
  --radius:10px; --radius-lg:16px;
  --shadow:0 2px 12px rgba(28,28,28,0.08); --shadow-lg:0 8px 32px rgba(28,28,28,0.12);
  --transition:all 0.22s cubic-bezier(0.4,0,0.2,1);
  --font-display:'Playfair Display',serif; --font-elegant:'Cormorant Garamond',serif; --font-ui:'Inter',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-ui);background:var(--ivory);color:var(--black);line-height:1.6;font-size:14px;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray4);border-radius:10px}

#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--black) 0%,var(--black2) 50%,#2A1F12 100%);position:fixed;inset:0;z-index:1000}
.login-card{background:var(--white);border-radius:var(--radius-lg);padding:48px 40px;width:420px;box-shadow:var(--shadow-lg);text-align:center;position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--gold),var(--rose),var(--gold))}
.login-logo .brand-name{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--black);letter-spacing:2px}
.login-logo .brand-sub{font-family:var(--font-elegant);font-size:14px;color:var(--gray2);letter-spacing:4px;text-transform:uppercase;display:block;margin-top:-4px}
.login-tagline{font-family:var(--font-elegant);font-size:13px;color:var(--gray3);margin:8px 0 32px;font-style:italic}
.login-form label{display:block;text-align:left;font-size:11px;font-weight:600;color:var(--gray2);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.login-form input,.login-form select{width:100%;padding:12px 16px;border:1.5px solid var(--gray5);border-radius:var(--radius);font-family:var(--font-ui);font-size:14px;color:var(--black);background:var(--ivory);transition:var(--transition);margin-bottom:16px;outline:none}
.login-form input:focus,.login-form select:focus{border-color:var(--gold);background:var(--white);box-shadow:0 0 0 3px rgba(201,168,106,0.12)}
.btn-login{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font-ui);font-size:14px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:var(--transition);margin-top:8px}
.btn-login:hover{background:linear-gradient(135deg,var(--gold),var(--gold-light));color:var(--black);transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,106,0.35)}
.login-error{color:#C0392B;font-size:12px;margin-top:8px;display:none}
.login-flower{font-size:48px;margin-bottom:16px;display:block}

#app{display:none;min-height:100vh}
#app.active{display:flex}

#sidebar{width:var(--sidebar-w);background:var(--black);min-height:100vh;position:fixed;left:0;top:0;z-index:100;display:flex;flex-direction:column;transition:var(--transition);overflow:visible}
.sidebar-header{padding:24px 20px 20px;border-bottom:1px solid rgba(255,255,255,0.06)}
.sidebar-brand{font-family:var(--font-display);font-size:18px;font-weight:700;color:var(--white);letter-spacing:1px;line-height:1.2}
.sidebar-brand span{color:var(--gold)}
.sidebar-sub{font-family:var(--font-elegant);font-size:11px;color:var(--gray3);letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.sidebar-marca-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,106,0.12);border:1px solid rgba(201,168,106,0.25);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--gold);font-weight:600;letter-spacing:1px;margin-top:8px;cursor:pointer;transition:var(--transition)}
.sidebar-marca-badge:hover{background:rgba(201,168,106,0.2)}
.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 0;max-height:calc(100vh - 160px)}
.nav-section-title{font-size:9px;font-weight:600;color:var(--gray2);letter-spacing:2px;text-transform:uppercase;padding:16px 20px 6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:rgba(255,255,255,0.55);cursor:pointer;transition:var(--transition);font-size:13px;font-weight:400;border-left:3px solid transparent;user-select:none}
.nav-item:hover{background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.85)}
.nav-item.active{background:rgba(201,168,106,0.1);color:var(--gold);border-left-color:var(--gold);font-weight:500}
.nav-item .nav-icon{width:18px;text-align:center;font-size:15px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--gold);color:var(--black);font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px}
.sidebar-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.06)}
.sidebar-user{display:flex;align-items:center;gap:10px}
.user-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dark),var(--gold));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--white);flex-shrink:0}
.user-info .user-name{font-size:12px;font-weight:600;color:var(--white);line-height:1.2}
.user-info .user-role{font-size:10px;color:var(--gray3)}
.btn-logout{margin-left:auto;background:none;border:none;color:var(--gray3);cursor:pointer;font-size:16px;padding:4px;border-radius:4px;transition:var(--transition)}
.btn-logout:hover{color:#E74C3C}

#main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;display:flex;flex-direction:column}
#topbar{height:var(--header-h);background:var(--white);border-bottom:1px solid var(--gray5);display:flex;align-items:center;padding:0 28px;gap:16px;position:sticky;top:0;z-index:50}
.topbar-title{font-family:var(--font-display);font-size:19px;font-weight:600;color:var(--black);flex:1}
.topbar-search{display:flex;align-items:center;background:var(--ivory);border:1.5px solid var(--gray5);border-radius:24px;padding:0 16px;gap:8px;width:260px;transition:var(--transition)}
.topbar-search:focus-within{border-color:var(--gold);background:var(--white)}
.topbar-search input{border:none;background:transparent;outline:none;font-size:13px;font-family:var(--font-ui);color:var(--black);width:100%;padding:8px 0}
.topbar-actions{display:flex;align-items:center;gap:10px}
.topbar-btn{width:36px;height:36px;border-radius:50%;background:var(--ivory);border:1.5px solid var(--gray5);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:var(--transition);position:relative}
.topbar-btn:hover{border-color:var(--gold);background:var(--white)}
.notif-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;background:#E74C3C;border-radius:50%;border:2px solid var(--white)}
#page-content{flex:1;padding:28px;overflow-y:auto}

.card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--gray5);box-shadow:var(--shadow);padding:24px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.card-title{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--black)}
.card-subtitle{font-size:12px;color:var(--gray3);margin-top:2px}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{background:var(--white);border-radius:var(--radius-lg);border:1px solid var(--gray5);padding:20px 22px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:var(--transition);cursor:default}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--gold-light)}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--gold);border-radius:2px 0 0 2px}
.kpi-card.rose::before{background:var(--rose-dark)}
.kpi-card.green::before{background:var(--green)}
.kpi-card.blue::before{background:#3498DB}
.kpi-card.purple::before{background:#8E44AD}
.kpi-label{font-size:10px;font-weight:600;color:var(--gray3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.kpi-value{font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--black);line-height:1}
.kpi-value .kpi-currency{font-size:14px;font-weight:400;color:var(--gray3);margin-right:2px;font-family:var(--font-ui)}
.kpi-change{font-size:11px;margin-top:6px;display:flex;align-items:center;gap:3px}
.kpi-change.up{color:#27AE60}
.kpi-change.down{color:#E74C3C}
.kpi-icon{position:absolute;right:18px;top:50%;transform:translateY(-50%);font-size:32px;opacity:0.08}

.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius);font-family:var(--font-ui);font-size:13px;font-weight:500;cursor:pointer;transition:var(--transition);border:1.5px solid transparent;white-space:nowrap}
.btn-primary{background:var(--gold);color:var(--white);border-color:var(--gold)}
.btn-primary:hover{background:var(--gold-dark);border-color:var(--gold-dark);transform:translateY(-1px)}
.btn-secondary{background:var(--white);color:var(--black);border-color:var(--gray5)}
.btn-secondary:hover{border-color:var(--gold);color:var(--gold-dark)}
.btn-danger{background:#E74C3C;color:var(--white);border-color:#E74C3C}
.btn-danger:hover{background:#C0392B}
.btn-success{background:var(--green);color:var(--white);border-color:var(--green)}
.btn-ghost{background:transparent;color:var(--gray2);border-color:transparent;padding:6px 12px}
.btn-ghost:hover{background:var(--ivory);color:var(--black)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-lg{padding:12px 24px;font-size:15px}

.table-wrapper{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--gray5)}
table.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table thead th{background:var(--ivory-dark);padding:11px 14px;text-align:left;font-weight:600;font-size:11px;color:var(--gray2);letter-spacing:0.8px;text-transform:uppercase;border-bottom:1px solid var(--gray5);white-space:nowrap}
.data-table tbody tr{border-bottom:1px solid var(--ivory-dark);transition:var(--transition)}
.data-table tbody tr:hover{background:var(--ivory)}
.data-table tbody td{padding:11px 14px;color:var(--black);vertical-align:middle}
.data-table tbody tr:last-child{border-bottom:none}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:0.5px}
.badge-success{background:#EAFAF1;color:#1E8449}
.badge-warning{background:#FEF9E7;color:#D68910}
.badge-danger{background:#FDEDEC;color:#C0392B}
.badge-info{background:#EAF2FF;color:#2471A3}
.badge-gold{background:rgba(201,168,106,0.15);color:var(--gold-dark)}
.badge-rose{background:rgba(216,180,182,0.2);color:var(--rose-dark)}
.badge-green{background:rgba(111,138,117,0.15);color:var(--green-dark)}

.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--gray2);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.form-control{width:100%;padding:10px 14px;border:1.5px solid var(--gray5);border-radius:var(--radius);font-family:var(--font-ui);font-size:13px;color:var(--black);background:var(--white);transition:var(--transition);outline:none}
.form-control:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,106,0.12)}
.form-control::placeholder{color:var(--gray4)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px}

.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.search-input{display:flex;align-items:center;background:var(--white);border:1.5px solid var(--gray5);border-radius:var(--radius);padding:0 14px;gap:8px;flex:1;min-width:200px;max-width:340px;transition:var(--transition)}
.search-input:focus-within{border-color:var(--gold)}
.search-input input{border:none;outline:none;background:transparent;font-size:13px;font-family:var(--font-ui);width:100%;padding:9px 0;color:var(--black)}
.filter-select{padding:9px 14px;border:1.5px solid var(--gray5);border-radius:var(--radius);font-family:var(--font-ui);font-size:13px;background:var(--white);color:var(--black);cursor:pointer;outline:none;transition:var(--transition)}
.filter-select:focus{border-color:var(--gold)}

.modal-overlay{position:fixed;inset:0;background:rgba(28,28,28,0.55);backdrop-filter:blur(2px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:620px;max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform 0.25s cubic-bezier(0.4,0,0.2,1)}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--gray5);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);border-radius:var(--radius-lg) var(--radius-lg) 0 0}
.modal-title{font-family:var(--font-display);font-size:17px;font-weight:600}
.modal-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--ivory);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.modal-close:hover{background:var(--gray5)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray5);display:flex;gap:10px;justify-content:flex-end}

.toast-container{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--black);color:var(--white);padding:12px 18px;border-radius:var(--radius);font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);animation:toastIn 0.3s ease,toastOut 0.3s ease 2.7s forwards;max-width:340px}
.toast.success{border-left:4px solid #27AE60}
.toast.error{border-left:4px solid #E74C3C}
.toast.info{border-left:4px solid var(--gold)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;pointer-events:none}}

.tabs{display:flex;gap:2px;border-bottom:2px solid var(--gray5);margin-bottom:24px}
.tab-btn{padding:9px 18px;background:none;border:none;font-family:var(--font-ui);font-size:13px;font-weight:500;color:var(--gray3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:var(--transition)}
.tab-btn:hover{color:var(--black)}
.tab-btn.active{color:var(--gold-dark);border-bottom-color:var(--gold)}

.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1px solid var(--gray5);font-size:11px;font-weight:500;background:var(--ivory);color:var(--gray2);cursor:default}

.section-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.section-title{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--black)}
.section-subtitle{font-size:13px;color:var(--gray3);margin-top:2px}

.progress{background:var(--gray5);border-radius:10px;height:6px;overflow:hidden}
.progress-bar{height:100%;border-radius:10px;background:var(--gold);transition:width 0.5s ease}

.empty-state{text-align:center;padding:60px 20px;color:var(--gray3)}
.empty-state .empty-icon{font-size:48px;margin-bottom:12px;display:block}
.empty-state h3{font-family:var(--font-display);font-size:18px;color:var(--gray2);margin-bottom:8px}

.img-upload-zone{border:2px dashed var(--gray4);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:var(--transition);background:var(--ivory)}
.img-upload-zone:hover,.img-upload-zone.drag-over{border-color:var(--gold);background:rgba(201,168,106,0.05)}
.img-upload-zone input[type=file]{display:none}

.page{display:none}
.page.active{display:block;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.divider{height:1px;background:var(--gray5);margin:20px 0}

.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--rose-dark),var(--rose));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--white);flex-shrink:0}

.dashboard-charts{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:20px}
.chart-container{position:relative;height:260px}
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--ivory-dark)}
.activity-item:last-child{border-bottom:none}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--gold);margin-top:5px;flex-shrink:0}
.activity-dot.rose{background:var(--rose-dark)}
.activity-dot.green{background:var(--green)}
.activity-dot.blue{background:#3498DB}
.activity-text{font-size:12px;line-height:1.5;color:var(--gray2)}
.activity-time{font-size:10px;color:var(--gray3);margin-top:2px}

.client-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--gray5);padding:16px;display:flex;align-items:center;gap:14px;transition:var(--transition);cursor:pointer}
.client-card:hover{border-color:var(--gold-light);box-shadow:var(--shadow);transform:translateY(-1px)}
.client-info .client-name{font-weight:600;font-size:14px;color:var(--black)}
.client-info .client-meta{font-size:12px;color:var(--gray3);margin-top:2px}
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}

.product-thumb{width:42px;height:42px;border-radius:var(--radius);object-fit:cover;background:var(--ivory-dark);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;border:1px solid var(--gray5)}
.stock-indicator{display:flex;align-items:center;gap:6px}
.stock-dot{width:8px;height:8px;border-radius:50%}
.stock-ok{background:#27AE60}
.stock-low{background:#F39C12}
.stock-out{background:#E74C3C}

.wa-float{position:fixed;bottom:80px;right:24px;width:50px;height:50px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(37,211,102,0.35);transition:var(--transition);z-index:200;text-decoration:none}
.wa-float:hover{transform:scale(1.1)}

@media (max-width:900px){:root{--sidebar-w:220px}.grid-4{grid-template-columns:repeat(2,1fr)}}
@media (max-width:600px){
  #sidebar{transform:translateX(-100%)}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <span class="login-flower">🌸</span>
    <div class="login-logo">
      <div class="brand-name">UNIVERSO <span style="color:var(--gold)">FLORAL</span></div>
      <span class="brand-sub">ERP Enterprise</span>
    </div>
    <p class="login-tagline">Flores que transforman momentos en recuerdos</p>
    <div class="login-form">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="login-user" placeholder="Ingresa tu usuario" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-pass" placeholder="Ingresa tu contraseña" autocomplete="current-password">
      </div>
      <div class="form-group">
        <label>Perfil de acceso</label>
        <select id="login-role">
          <option value="admin">Administrador</option>
          <option value="gerente">Gerente</option>
          <option value="vendedor">Vendedor</option>
          <option value="disenador">Diseñador Floral</option>
          <option value="delivery">Delivery</option>

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */
const DB_NAME='UniversoFloralERP', DB_VER=1;
let db=null;
let dbReadyPromise=null;
const STORES=['usuarios','productos','clientes','pedidos','ventas','inventario','recetas','imagenes','eventos','proveedores','compras','campanias','finanzas','delivery','auditoria','configuracion','cotizaciones','categorias','insumos'];

function initDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      STORES.forEach(s=>{ if(!d.objectStoreNames.contains(s)) d.createObjectStore(s,{keyPath:'id',autoIncrement:true}); });
    };
    req.onsuccess=e=>{db=e.target.result;resolve(db);};
    req.onerror=e=>reject(e);
  });
}
function dbGet(store,id){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).get(id);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
function dbGetAll(store){return new Promise((res,rej)=>{const tx=db.transaction(store,'readonly');const r=tx.objectStore(store).getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});}
function dbPut(store,data){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const r=tx.objectStore(store).put(data);r.onsuccess=()=>{res(r.result);emitEvent('db:change',{store,data});};r.onerror=()=>rej(r.error);});}
function dbDelete(store,id){return new Promise((res,rej)=>{const tx=db.transaction(store,'readwrite');const r=tx.objectStore(store).delete(id);r.onsuccess=()=>{res();emitEvent('db:change',{store,id});};r.onerror=()=>rej(r.error);});}

const LS={
  get:k=>{try{return JSON.parse(localStorage.getItem('uf_'+k));}catch(e){return null;}},
  set:(k,v)=>localStorage.setItem('uf_'+k,JSON.stringify(v)),
  remove:k=>localStorage.removeItem('uf_'+k)
};

/* ═══ BUS DE EVENTOS ═══ */
const EventBus={_listeners:{},on(ev,fn){(this._listeners[ev]=this._listeners[ev]||[]).push(fn);},off(ev,fn){if(this._listeners[ev])this._listeners[ev]=this._listeners[ev].filter(f=>f!==fn);},emit(ev,data){(this._listeners[ev]||[]).forEach(fn=>{try{fn(data);}catch(e){}});}};
function emitEvent(ev,data){EventBus.emit(ev,data);}

function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value.trim();
  const usuario=USUARIOS_DEMO.find(x=>x.usuario===u&&x.clave===p);
  if(!usuario){document.getElementById('login-error').style.display='block';return;}
  SESSION={...usuario,loginAt:new Date().toISOString()};

  document.getElementById('login-screen').style.display='none';

  (dbReadyPromise||Promise.resolve()).then(async ()=>{
    await registrarAuditoria('LOGIN',`Ingreso al sistema — rol: ${SESSION.rol}`);

function doLogout(){

function hasPermiso(modulo){
  if(!SESSION) return false;

}
async function registrarAuditoria(accion,detalle){
  if(!db) return;

}

/* Escapa comillas/backslashes para interpolar texto dentro de atributos onclick="...('texto')" de forma segura */
function jsEscape(str){
  return String(str||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,' ');
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}
function previewImagen(input,previewId){
  if(!input.files[0]) return;
  const reader=new FileReader();
  reader.onload=e=>{
    document.getElementById(previewId).innerHTML=`<img src="${e.target.result}" style="max-height:90px;border-radius:8px">`;
  };
  reader.readAsDataURL(input.files[0]);
}

async function initApp(){
  if(SESSION){
    document.getElementById('sidebar-avatar').textContent=SESSION.avatar;
    document.getElementById('sidebar-username').textContent=SESSION.nombre;
    document.getElementById('sidebar-userrole').textContent=SESSION.rol+' · Universo Floral';
  }
  const existing=await dbGetAll('productos');
  if(existing.length===0) await seedDemoData();

  renderSidebar();
  navigateTo('dashboard');

  EventBus.on('db:change',()=>{ if(currentPage==='dashboard') renderDashboard(); });
}

async function seedDemoData(){
  const stores=[['categorias',DEMO_DATA.categorias],['productos',DEMO_DATA.productos],['clientes',DEMO_DATA.clientes],['proveedores',DEMO_DATA.proveedores],['insumos',DEMO_DATA.insumos],['pedidos',DEMO_DATA.pedidos],['ventas',DEMO_DATA.ventas]];
  for(const [store,data] of stores){ for(const item of data){ await dbPut(store,item); } }
  showToast('✅ Datos demo cargados correctamente','success');
}

function renderSidebar(){
  const nav=document.getElementById('sidebar-nav');
  nav.innerHTML='';
  for(const item of NAV_ITEMS){
    if(item.section){ nav.innerHTML+=`<div class="nav-section-title">${item.section}</div>`; continue; }
    if(!item.always && !hasPermiso(item.perm)) continue;
    nav.innerHTML+=`<div class="nav-item" id="nav-${item.id}" onclick="navigateTo('${item.id}')">
      <span class="nav-icon">${item.icon}</span><span>${item.label}</span>
      ${item.badge==='pendientes'?'<span class="nav-badge" id="badge-pedidos">0</span>':''}
    </div>`;
  }
  updatePedidosBadge();
}
async function updatePedidosBadge(){
  const pedidos=await dbGetAll('pedidos');
  const pend=pedidos.filter(p=>p.estado==='pendiente').length;
  const el=document.getElementById('badge-pedidos');
  if(el){ el.textContent=pend; el.style.display=pend>0?'flex':'none'; }
}

let currentPage='';
function navigateTo(page){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const navEl=document.getElementById('nav-'+page);
  if(navEl) navEl.classList.add('active');

  const titles={dashboard:'Dashboard Ejecutivo',pos:'POS Floral',ventas:'Ventas',cotizaciones:'Cotizaciones',pedidos:'Pedidos',crm:'CRM — Clientes',inventario:'Inventario',produccion:'Producción Floral',recetas:'Recetas Florales',compras:'Compras',proveedores:'Proveedores',delivery:'Delivery',eventos:'Eventos',finanzas:'Finanzas',reportes:'Reportes y Analítica',marketing:'Marketing',analitica:'Business Intelligence',biblioteca:'Biblioteca Multimedia',catalogo2:'Catálogo Web',gestorvisual:'Gestor Visual',showroom:'Showroom Digital',landingbuilder:'Landing Builder',portalcliente:'Portal Cliente',backups:'Backups & Cloud Ready',catalogo:'Catálogo Web',configuracion:'Configuración',auditoria:'Auditoría del Sistema',perfil:'Mi Perfil'};
  document.getElementById('topbar-title').textContent=titles[page]||page;
  document.getElementById('page-content').innerHTML='';

  switch(page){
    case 'dashboard': renderDashboard(); break;
    case 'crm': renderCRM(); break;
    case 'inventario': renderInventario(); break;
    case 'pedidos': renderPedidos(); break;
    case 'proveedores': renderProveedores(); break;
    case 'pos': renderPOS(); break;

function openModal(title,bodyHtml,buttons){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=bodyHtml;
  const footer=document.getElementById('modal-footer');
  footer.innerHTML='';
  (buttons||[]).forEach(b=>{
    const btn=document.createElement('button');
    btn.className='btn '+b.class;
    btn.textContent=b.label;
    btn.setAttribute('onclick',b.action);
    footer.appendChild(btn);
  });
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOnBg(e){ if(e.target.id==='modal-overlay') closeModal(); }

function showToast(msg,type){
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className='toast '+(type||'info');
  t.innerHTML=msg;
  c.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

    <div class="card">
      <div class="card-header">
        <div><div class="card-title">Ventas por Día — Semana Actual</div><div class="card-subtitle">Comparado con semana anterior</div></div>

function getBadgeClass(estado){

let crmFiltro='todos', crmSearch='';

    return true;
  });
  const totales={vip:0,premium:0,regular:0,corporativo:0};
  clientes.forEach(c=>{ if(totales[c.tipo]!==undefined) totales[c.tipo]++; });

  const html=`
  <div class="section-header">
    <div><div class="section-title">CRM — Gestión de Clientes</div>

    <div class="kpi-card" onclick="setCRMFiltro('premium')" style="cursor:pointer"><div class="kpi-label">Premium</div><div class="kpi-value">${totales.premium}</div><div class="kpi-icon">💎</div></div>
    <div class="kpi-card green" onclick="setCRMFiltro('corporativo')" style="cursor:pointer"><div class="kpi-label">Corporativos</div><div class="kpi-value">${totales.corporativo}</div><div class="kpi-icon">🏢</div></div>
    <div class="kpi-card rose" onclick="setCRMFiltro('regular')" style="cursor:pointer"><div class="kpi-label">Regulares</div><div class="kpi-value">${totales.regular}</div><div class="kpi-icon">👤</div></div>
  </div>
  <div class="toolbar">
    <div class="search-input"><span>🔍</span><input type="text" placeholder="Buscar por nombre, teléfono, email..." value="${crmSearch}" oninput="crmSearch=this.value;renderCRM()"></div>
    <select class="filter-select" onchange="setCRMFiltro(this.value)">
      <option value="todos" ${crmFiltro==='todos'?'selected':''}>Todos</option>
      <option value="vip" ${crmFiltro==='vip'?'selected':''}>VIP</option>
      <option value="premium" ${crmFiltro==='premium'?'selected':''}>Premium</option>
      <option value="corporativo" ${crmFiltro==='corporativo'?'selected':''}>Corporativo</option>
      <option value="regular" ${crmFiltro==='regular'?'selected':''}>Regular</option>
    </select>
    <button class="btn btn-secondary" onclick="exportarClientes()">📥 Exportar</button>
  </div>
  <div class="clients-grid">
    ${filtrados.map(c=>`
    <div class="client-card" onclick="verCliente(${c.id})">
      <div class="avatar" style="background:${getClienteColor(c.tipo)}">${c.nombre.split(' ').slice(0,2).map(n=>n[0]).join('')}</div>
      <div class="client-info" style="flex:1">
        <div class="client-name">${c.nombre}</div>
        <div class="client-meta">📱 ${c.tel} · ${c.email}</div>
        <div class="client-meta" style="margin-top:4px"><span class="badge ${getTipoBadge(c.tipo)}">${c.tipo}</span>
        <span style="margin-left:6px;font-size:11px;color:var(--gray3)">${c.compras} compras · S/ ${c.totalGastado.toLocaleString()}</span></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end">
        <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editarCliente(${c.id})">✏️</button>

      </div>
    </div>`).join('')}
  </div>`;
  document.getElementById('page-content').innerHTML=html;

async function guardarCliente(){
  const nombre=document.getElementById('cli-nombre')?.value.trim();
  if(!nombre){ showToast('⚠️ El nombre es obligatorio','error'); return; }
  const nuevo={nombre,tel:document.getElementById('cli-tel')?.value.trim()||'',email:document.getElementById('cli-email')?.value.trim()||'',tipo:document.getElementById('cli-tipo')?.value||'regular',direccion:document.getElementById('cli-dir')?.value.trim()||'',notas:document.getElementById('cli-notas')?.value.trim()||'',compras:0,totalGastado:0,ultimaCompra:null,marca:MARCA_ACTIVA,creadoEn:new Date().toISOString()};
  await dbPut('clientes',nuevo);
  await registrarAuditoria('CLIENTE_CREADO',`Nuevo cliente: ${nombre}`);
  closeModal(); showToast(`✅ Cliente "${nombre}" registrado`,'success'); renderCRM();
}

async function editarCliente(id){
  const c=await dbGet('clientes',id); if(!c) return;
  openModal('✏️ Editar Cliente',`
  <div class="form-grid">
    <div class="form-group"><label class="form-label">Nombre completo</label><input class="form-control" id="ecli-nombre" value="${c.nombre}"></div>

    <div class="form-group"><label class="form-label">Tipo</label><select class="form-control" id="ecli-tipo">
      ${['regular','premium','vip','corporativo'].map(t=>`<option value="${t}" ${c.tipo===t?'selected':''}>${t}</option>`).join('')}

  [{label:'Guardar Cambios',class:'btn-primary',action:`actualizarCliente(${id})`},{label:'Cancelar',class:'btn-secondary',action:'closeModal()'}]);

async function actualizarCliente(id){
  const c=await dbGet('clientes',id); if(!c) return;
  c.nombre=document.getElementById('ecli-nombre').value.trim();
  c.tel=document.getElementById('ecli-tel').value.trim();
  c.email=document.getElementById('ecli-email').value.trim();
  c.tipo=document.getElementById('ecli-tipo').value;
  c.direccion=document.getElementById('ecli-dir').value.trim();
  c.notas=document.getElementById('ecli-notas').value.trim();
  await dbPut('clientes',c);
  await registrarAuditoria('CLIENTE_EDITADO',`Cliente actualizado: ${c.nombre}`);
  closeModal(); showToast('✅ Cliente actualizado','success'); renderCRM();
}

async function eliminarCliente(id){
  const c=await dbGet('clientes',id);
  if(!confirm(`¿Eliminar cliente "${c?.nombre}"? Esta acción no se puede deshacer.`)) return;
  await dbDelete('clientes',id);
  await registrarAuditoria('CLIENTE_ELIMINADO',`Cliente eliminado: ${c?.nombre}`);
  closeModal(); showToast('🗑️ Cliente eliminado','info'); renderCRM();
}

function nuevoWhatsApp(tel,nombre){
  const msg=encodeURIComponent(`Hola ${nombre}, te contactamos desde Universo Floral 🌸 `);
  window.open(`https://wa.me/51${tel}?text=${msg}`,'_blank');
}

function exportarClientes(){
  dbGetAll('clientes').then(clientes=>{
    const csv=['Nombre,Teléfono,Email,Tipo,Compras,Total Gastado,Última Compra'].concat(clientes.map(c=>`"${c.nombre}","${c.tel}","${c.email}","${c.tipo}",${c.compras},${c.totalGastado},"${c.ultimaCompra||''}"`)).join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='clientes-universo-floral.csv'; a.click();
    showToast('📥 Clientes exportados en CSV','success');
  });
}

function renderInventarioView(prods,cats){
  let filtrados=prods.filter(p=>{
    if(MARCA_ACTIVA!=='todas' && p.marca!==MARCA_ACTIVA) return false;
    if(invFiltro==='bajo') return p.stock>0 && p.stock<=p.stockMin;
    if(invFiltro==='agotado') return p.stock===0;
    if(invFiltro!=='todos' && !isNaN(parseInt(invFiltro))) return p.cat===parseInt(invFiltro);
    return true;
  }).filter(p=>!invSearch || p.nombre.toLowerCase().includes(invSearch.toLowerCase()));

  const sinStock=prods.filter(p=>p.stock===0).length;
  const stockBajo=prods.filter(p=>p.stock>0&&p.stock<=p.stockMin).length;
  const valorTotal=prods.reduce((s,p)=>s+(p.stock*p.costo),0);

  const html=`
  <div class="section-header">
    <div><div class="section-title">Inventario de Productos</div><div class="section-subtitle">${prods.length} productos · ${filtrados.length} mostrados</div></div>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" onclick="modalAjusteInventario()">📊 Ajustar Stock</button>
      <button class="btn btn-primary" onclick="modalNuevoProducto()">+ Nuevo Producto</button>
    </div>
  </div>
  <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
    <div class="kpi-card"><div class="kpi-label">Total Productos</div><div class="kpi-value">${prods.length}</div></div>
    <div class="kpi-card rose"><div class="kpi-label">Sin Stock</div><div class="kpi-value" style="color:#E74C3C">${sinStock}</div></div>
    <div class="kpi-card"><div class="kpi-label">Stock Bajo</div><div class="kpi-value" style="color:#F39C12">${stockBajo}</div></div>
    <div class="kpi-card green"><div class="kpi-label">Valor Inventario</div><div class="kpi-value"><span class="kpi-currency">S/</span>${valorTotal.toLocaleString('es-PE',{minimumFractionDigits:0})}</div></div>
  </div>
  <div class="toolbar">
    <div class="search-input"><span>🔍</span><input type="text" placeholder="Buscar productos..." value="${invSearch}" oninput="invSearch=this.value;renderInventario()"></div>
    <select class="filter-select" onchange="invFiltro=this.value;renderInventario()">
      <option value="todos">Todas las categorías</option>
      <option value="bajo">⚠️ Stock bajo</option>
      <option value="agotado">🚨 Agotados</option>
      ${cats.map(c=>`<option value="${c.id}" ${invFiltro==c.id?'selected':''}>${c.icono} ${c.nombre}</option>`).join('')}
    </select>
    <button class="btn btn-secondary btn-sm" onclick="exportarInventario()">📥 Exportar</button>
  </div>
  <div class="card" style="padding:0">
    <div class="table-wrapper">
      <table class="data-table">
        <thead><tr><th>Producto</th><th>Categoría</th><th>Precio Venta</th><th>Costo</th><th>Margen</th><th>Stock</th><th>Estado</th><th>Marca</th><th>Acciones</th></tr></thead>
        <tbody>
          ${filtrados.map(p=>{
            const cat=cats.find(c=>c.id===p.cat)||{};
            const margen=p.precio?Math.round((p.precio-p.costo)/p.precio*100):0;
            const stockStatus=p.stock===0?'out':p.stock<=p.stockMin?'low':'ok';
            const stockColors={ok:'#27AE60',low:'#F39C12',out:'#E74C3C'};
            const stockLabels={ok:'OK',low:'Bajo',out:'Agotado'};
            return `<tr>
              <td><div style="display:flex;align-items:center;gap:10px">
                <div class="product-thumb">${p.imagen?`<img src="${p.imagen}" style="width:42px;height:42px;object-fit:cover;border-radius:8px">`:(cat.icono||'🌸')}</div>
                <div><div style="font-weight:600;font-size:13px">${p.nombre}</div><div style="font-size:11px;color:var(--gray3)">${(p.descripcion||'').slice(0,40)}</div></div>
              </div></td>
              <td><span class="chip">${cat.icono||''} ${cat.nombre||'—'}</span></td>
              <td style="font-weight:600">S/ ${p.precio.toFixed(2)}</td>
              <td style="color:var(--gray2)">S/ ${p.costo.toFixed(2)}</td>
              <td><span style="color:${margen>=40?'#27AE60':'#F39C12'};font-weight:600">${margen}%</span></td>
              <td><div class="stock-indicator"><div class="stock-dot stock-${stockStatus}"></div><span style="font-weight:600">${p.stock}</span><span style="color:var(--gray3);font-size:11px">/ mín ${p.stockMin}</span></div></td>
              <td><span class="badge" style="background:${stockColors[stockStatus]}22;color:${stockColors[stockStatus]}">${stockLabels[stockStatus]}</span></td>
              <td><span class="badge ${p.marca==='momentia'?'badge-rose':'badge-gold'}">${p.marca==='momentia'?'Momentia':'UF'}</span></td>
              <td><div style="display:flex;gap:4px">
                <button class="btn btn-ghost btn-sm" onclick="editarProducto(${p.id})" title="Editar">✏️</button>
                <button class="btn btn-ghost btn-sm" onclick="ajustarStock(${p.id})" title="Ajustar stock">📦</button>
                <button class="btn btn-ghost btn-sm" onclick="eliminarProducto(${p.id})" title="Eliminar" style="color:#E74C3C">🗑️</button>
              </div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
  document.getElementById('page-content').innerHTML=html;
}

async function guardarProducto(){
  const nombre=document.getElementById('np-nombre')?.value.trim();
  if(!nombre){ showToast('⚠️ El nombre es obligatorio','error'); return; }
  let imgBase64=null;
  const imgInput=document.getElementById('np-img-input');
  if(imgInput?.files[0]) imgBase64=await fileToBase64(imgInput.files[0]);

  const nuevo={nombre,cat:parseInt(document.getElementById('np-cat')?.value||1),marca:document.getElementById('np-marca')?.value||'universo',precio:parseFloat(document.getElementById('np-precio')?.value||0),costo:parseFloat(document.getElementById('np-costo')?.value||0),stock:parseInt(document.getElementById('np-stock')?.value||0),stockMin:parseInt(document.getElementById('np-stockmin')?.value||2),descripcion:document.getElementById('np-desc')?.value.trim()||'',imagen:imgBase64,creadoEn:new Date().toISOString()};

  const newId=await dbPut('productos',nuevo);
  if(imgBase64) await dbPut('imagenes',{tipo:'producto',productoId:newId,nombre:nuevo.nombre,data:imgBase64,fecha:new Date().toISOString(),marca:nuevo.marca});
  await registrarAuditoria('PRODUCTO_CREADO',`Nuevo producto: ${nombre}`);
  closeModal(); showToast(`✅ Producto "${nombre}" creado`,'success'); renderInventario();
}

async function actualizarProducto(id){
  const p=await dbGet('productos',id); if(!p) return;
  const imgInput=document.getElementById('ep-img-input');
  let imagenCambio=false;
  if(imgInput?.files[0]){ p.imagen=await fileToBase64(imgInput.files[0]); imagenCambio=true; }
  p.nombre=document.getElementById('ep-nombre').value.trim();
  p.cat=parseInt(document.getElementById('ep-cat').value);
  p.marca=document.getElementById('ep-marca').value;
  p.precio=parseFloat(document.getElementById('ep-precio').value);
  p.costo=parseFloat(document.getElementById('ep-costo').value);
  p.stock=parseInt(document.getElementById('ep-stock').value);
  p.stockMin=parseInt(document.getElementById('ep-stockmin').value);
  p.descripcion=document.getElementById('ep-desc').value.trim();
  await dbPut('productos',p);
  if(imagenCambio){
    const imagenes=await dbGetAll('imagenes');
    const existente=imagenes.find(img=>img.productoId===id);
    if(existente){ existente.data=p.imagen; existente.nombre=p.nombre; await dbPut('imagenes',existente); }
    else { await dbPut('imagenes',{tipo:'producto',productoId:id,nombre:p.nombre,data:p.imagen,fecha:new Date().toISOString(),marca:p.marca}); }
  }
  await registrarAuditoria('PRODUCTO_EDITADO',`Producto actualizado: ${p.nombre}`);
  closeModal(); showToast('✅ Producto actualizado','success'); renderInventario();
}

  </div>

    </select></div>

  </div>`,
  [{label:'Aplicar Ajuste',class:'btn-primary',action:`confirmarAjusteStock(${id})`},{label:'Cancelar',class:'btn-secondary',action:'closeModal()'}]);
}

async function confirmarAjusteStock(id){
  const p=await dbGet('productos',id);
  const tipo=document.getElementById('aj-tipo').value;
  const qty=parseInt(document.getElementById('aj-qty').value||0);
  const motivo=document.getElementById('aj-motivo').value.trim();
  if(tipo==='entrada') p.stock+=qty; else if(tipo==='salida') p.stock=Math.max(0,p.stock-qty); else p.stock=qty;
  await dbPut('productos',p);
  await dbPut('inventario',{productoId:id,productoNombre:p.nombre,tipo,cantidad:qty,motivo,stockNuevo:p.stock,fecha:new Date().toISOString(),usuario:SESSION?.nombre});
  await registrarAuditoria('STOCK_AJUSTADO',`${p.nombre}: ${tipo} ${qty} ud. — ${motivo}`);
  closeModal(); showToast(`✅ Stock actualizado: ${p.nombre} → ${p.stock} und.`,'success'); renderInventario();
}

async function eliminarProducto(id){
  const p=await dbGet('productos',id);
  if(!confirm(`¿Eliminar "${p?.nombre}"?`)) return;
  await dbDelete('productos',id);
  await registrarAuditoria('PRODUCTO_ELIMINADO',`Producto eliminado: ${p?.nombre}`);
  showToast('🗑️ Producto eliminado','info'); renderInventario();
}

  [{label:'Guardar Todos',class:'btn-primary',action:`guardarAjusteMasivo([${prods.slice(0,15).map(p=>p.id)}])`},{label:'Cerrar',class:'btn-secondary',action:'closeModal()'}]);

async function guardarAjusteMasivo(ids){
  let count=0;
  for(const id of ids){
    const input=document.getElementById('mas-'+id); if(!input) continue;
    const p=await dbGet('productos',id); if(!p) continue;
    const nuevoStock=parseInt(input.value);
    if(nuevoStock!==p.stock){ p.stock=nuevoStock; await dbPut('productos',p); count++; }
  }
  await registrarAuditoria('AJUSTE_MASIVO',`${count} productos actualizados`);
  closeModal(); showToast(`✅ ${count} productos actualizados`,'success'); renderInventario();
}

function exportarInventario(){
  dbGetAll('productos').then(prods=>{
    const csv=['Nombre,Categoría,Precio,Costo,Stock,StockMin,Marca'].concat(prods.map(p=>`"${p.nombre}",${p.cat},${p.precio},${p.costo},${p.stock},${p.stockMin},"${p.marca}"`)).join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='inventario-universo-floral.csv'; a.click();
    showToast('📥 Inventario exportado','success');
  });
}

async function confirmarEstadoPedido(id,estado){
  const p=await dbGet('pedidos',id); if(!p) return;
  const prev=p.estado;
  p.estado=estado;
  if(estado==='entregado' && prev!=='entregado'){
    for(const prod of p.productos){
      const pr=await dbGet('productos',prod.pid);
      if(pr){ pr.stock=Math.max(0,pr.stock-prod.qty); await dbPut('productos',pr); }
    }
    await dbPut('ventas',{fecha:new Date().toISOString().split('T')[0],clienteNombre:p.clienteNombre,total:p.total,igv:Math.round(p.total*0.18*100)/100,estado:'completado',canal:p.canal,pedidoId:p.id,marca:p.marca||MARCA_ACTIVA});
  }
  await dbPut('pedidos',p);
  await registrarAuditoria('PEDIDO_ESTADO',`Pedido #${p.id}: ${prev} → ${estado}`);
  closeModal(); showToast(`✅ Pedido #${p.id} → ${estado}`,'success'); renderPedidos(); updatePedidosBadge();
}

  <div class="form-group" style="margin-top:12px"><label class="form-label">Notas</label><textarea class="form-control" id="nc-notas" rows="2"></textarea></div>`,
  [{label:'Crear Orden',class:'btn-primary',action:'guardarCompra()'},{label:'Cancelar',class:'btn-secondary',action:'closeModal()'}]);
  window._compraItems=[];
}

function toggleProveedorManual(modo){
  document.getElementById('nc-prov-lista-wrap').style.display=modo==='lista'?'block':'none';
  document.getElementById('nc-prov-manual-wrap').style.display=modo==='manual'?'grid':'none';
}

function compraAddItem(){
  const sel=document.getElementById('nc-insumo'); const qty=parseInt(document.getElementById('nc-qty')?.value||1); const precio=parseFloat(document.getElementById('nc-precio')?.value||0);
  if(!sel.value) return;
  const [id,nombre,costo,unidad]=sel.value.split(':');
  window._compraItems=window._compraItems||[];
  const existing=window._compraItems.find(i=>i.id===id);
  if(existing) existing.qty+=qty; else window._compraItems.push({id,nombre,qty,unidad,precio:precio||parseFloat(costo)});
  compraRenderItems();
}
function compraRenderItems(){
  const el=document.getElementById('nc-items'); if(!el) return;
  const total=(window._compraItems||[]).reduce((s,i)=>s+i.precio*i.qty,0);
  el.innerHTML=(window._compraItems||[]).map((i,idx)=>`
  <div style="display:flex;align-items:center;gap:8px;padding:6px;background:var(--ivory-dark);border-radius:6px;margin-bottom:4px">
    <div style="flex:1;font-size:12px">${i.nombre} × ${i.qty} ${i.unidad||''}</div><div style="font-size:12px;font-weight:600">S/ ${(i.precio*i.qty).toFixed(2)}</div>
    <button onclick="window._compraItems.splice(${idx},1);compraRenderItems()" style="border:none;background:none;color:#E74C3C;cursor:pointer">✕</button>
  </div>`).join('');
  const t=document.getElementById('nc-total'); if(t) t.textContent=`S/ ${total.toFixed(2)}`;
}

async function guardarCompra(){
  const modo=document.getElementById('nc-prov-modo')?.value;
  let proveedorId=null, proveedorNombre='', proveedorTel='', proveedorManual=false;

  if(modo==='manual'){
    proveedorNombre=document.getElementById('nc-prov-nombre')?.value.trim();
    proveedorTel=document.getElementById('nc-prov-tel')?.value.trim();
    proveedorManual=true;
    if(!proveedorNombre){ showToast('⚠️ Escribe el nombre del proveedor','error'); return; }
  } else {
    const provSel=document.getElementById('nc-prov')?.value;
    if(!provSel){ showToast('⚠️ Selecciona un proveedor o cámbialo a manual','error'); return; }
    const [pid,pnombre,ptel]=provSel.split(':');
    proveedorId=parseInt(pid); proveedorNombre=pnombre; proveedorTel=ptel;
  }

  if(!(window._compraItems||[]).length){ showToast('⚠️ Agrega al menos un insumo','error'); return; }

  const total=(window._compraItems||[]).reduce((s,i)=>s+i.precio*i.qty,0);
  await dbPut('compras',{proveedorId,proveedorNombre,proveedorTel,proveedorManual,items:[...(window._compraItems||[])],total,fecha:document.getElementById('nc-fecha')?.value,fechaEntrega:document.getElementById('nc-entrega')?.value,notas:document.getElementById('nc-notas')?.value.trim(),estado:'pendiente',marca:MARCA_ACTIVA,creadoEn:new Date().toISOString()});
  await registrarAuditoria('COMPRA_CREADA',`Compra a: ${proveedorNombre} S/ ${total.toFixed(2)}`);
  closeModal(); showToast('✅ Orden de compra creada','success'); renderCompras();
}

async function recibirCompra(id){
  const c=await dbGet('compras',id); if(!c) return;
  for(const item of c.items||[]){
    const ins=await dbGet('insumos',parseInt(item.id));
    if(ins){ ins.stock+=item.qty; await dbPut('insumos',ins); }
  }
  c.estado='recibido'; c.fechaRecepcion=new Date().toISOString();
  await dbPut('compras',c);
  await registrarAuditoria('COMPRA_RECIBIDA',`Compra #${id} recibida — stock de insumos actualizado`);
  showToast('✅ Compra recibida. Stock de insumos actualizado','success'); renderCompras();
}

async function eliminarCompra(id){
  if(!confirm('¿Eliminar esta orden?')) return;
  await dbDelete('compras',id);
  showToast('🗑️ Orden eliminada','info'); renderCompras();
}

async function guardarInsumo(){
  const nombre=document.getElementById('ins-nombre')?.value.trim();
  if(!nombre){ showToast('⚠️ El nombre es obligatorio','error'); return; }
  const modo=document.getElementById('ins-prov-modo')?.value;
  let proveedorId=null, proveedorNombre='';
  if(modo==='lista'){
    const sel=document.getElementById('ins-prov-sel')?.value;
    if(sel){ const [pid,pn]=sel.split(':'); proveedorId=parseInt(pid); proveedorNombre=pn; }
  } else if(modo==='manual'){
    proveedorNombre=document.getElementById('ins-prov-manual-input')?.value.trim()||'';
  }
  await dbPut('insumos',{nombre,categoria:document.getElementById('ins-cat')?.value,unidad:document.getElementById('ins-unidad')?.value,costoUnitario:parseFloat(document.getElementById('ins-costo')?.value||0),stock:parseInt(document.getElementById('ins-stock')?.value||0),stockMin:parseInt(document.getElementById('ins-stockmin')?.value||10),proveedorId,proveedorNombre,creadoEn:new Date().toISOString()});
  await registrarAuditoria('INSUMO_CREADO',`Nuevo insumo: ${nombre}`);
  closeModal(); showToast(`✅ Insumo "${nombre}" creado`,'success'); renderInsumosCatalogo();
}

async function actualizarInsumo(id){
  const ins=await dbGet('insumos',id); if(!ins) return;
  ins.nombre=document.getElementById('eins-nombre').value.trim();
  ins.categoria=document.getElementById('eins-cat').value;
  ins.unidad=document.getElementById('eins-unidad').value.trim();
  ins.costoUnitario=parseFloat(document.getElementById('eins-costo').value);
  ins.stock=parseInt(document.getElementById('eins-stock').value);
  ins.stockMin=parseInt(document.getElementById('eins-stockmin').value);
  const provSel=document.getElementById('eins-prov-sel')?.value;
  if(provSel){ const [pid,pn]=provSel.split(':'); ins.proveedorId=parseInt(pid); ins.proveedorNombre=pn; }
  else { ins.proveedorId=null; ins.proveedorNombre=''; }
  await dbPut('insumos',ins);
  await registrarAuditoria('INSUMO_EDITADO',`Insumo actualizado: ${ins.nombre}`);
  closeModal(); showToast('✅ Insumo actualizado','success'); renderInsumosCatalogo();
}

async function guardarEvento(){
  const nombre=document.getElementById('ev-nombre')?.value.trim();
  if(!nombre){ showToast('⚠️ El nombre es obligatorio','error'); return; }
  await dbPut('eventos',{nombre,clienteNombre:document.getElementById('ev-cliente')?.value,tipo:document.getElementById('ev-tipo')?.value,fecha:document.getElementById('ev-fecha')?.value,hora:document.getElementById('ev-hora')?.value,lugar:document.getElementById('ev-lugar')?.value.trim(),personas:parseInt(document.getElementById('ev-personas')?.value||50),presupuesto:parseFloat(document.getElementById('ev-presupuesto')?.value||0),estado:document.getElementById('ev-estado')?.value,notas:document.getElementById('ev-notas')?.value.trim(),marca:MARCA_ACTIVA,creadoEn:new Date().toISOString()});
  await registrarAuditoria('EVENTO_CREADO',`Evento: ${nombre}`);
  closeModal(); showToast('✅ Evento registrado','success'); renderEventos();
}

async function eliminarEvento(id){
  if(!confirm('¿Eliminar este evento?')) return;
  await dbDelete('eventos',id);
  showToast('🗑️ Evento eliminado','info'); renderEventos();
}

let posCart=[], posCliente=null, posDescuento=0, posSelectedMetodo='Efectivo';

async function renderPOS(){
  const prods=await dbGetAll('productos'); const cats=await dbGetAll('categorias');
  const html=`
  <div style="display:grid;grid-template-columns:1fr 380px;gap:20px">

      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap">

          <button class="btn btn-primary btn-sm pos-cat-btn" onclick="posFilterCat(0,this)">Todos</button>

      <div id="pos-products-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px">
        ${prods.map(p=>`<div class="pos-prod-card" data-cat="${p.cat}" data-nombre="${p.nombre.toLowerCase()}" data-pid="${p.id}"
          onclick="posAddItemById(${p.id})"
          style="background:var(--white);border:1.5px solid var(--gray5);border-radius:var(--radius);padding:14px;cursor:pointer;transition:var(--transition);${p.stock===0?'opacity:0.5;cursor:not-allowed;':''}">
          <div style="font-size:32px;text-align:center;margin-bottom:8px">${p.imagen?`<img src="${p.imagen}" style="width:56px;height:56px;object-fit:cover;border-radius:8px">`:'🌸'}</div>
          <div style="font-size:12px;font-weight:600;color:var(--black);line-height:1.3;margin-bottom:4px">${p.nombre}</div>
          <div style="font-size:16px;font-weight:700;color:var(--gold-dark)">S/ ${p.precio.toFixed(2)}</div>
          <div style="font-size:10px;color:${p.stock===0?'#E74C3C':p.stock<=p.stockMin?'#F39C12':'var(--green)'}">${p.stock===0?'Agotado':`Stock: ${p.stock}`}</div>
        </div>`).join('')}
      </div>
    </div>
    <div>
      <div class="card" style="display:flex;flex-direction:column">
        <div class="card-header" style="border-bottom:1px solid var(--gray5);padding-bottom:12px">
          <div class="card-title">🛍️ Venta Actual</div>
          <button class="btn btn-ghost btn-sm" onclick="posClearCart()" style="color:#E74C3C">🗑️ Limpiar</button>
        </div>
        <div style="padding:12px 0;border-bottom:1px solid var(--ivory-dark)">
          <select class="form-control" id="pos-cliente-sel" onchange="posSetCliente(this.value)" style="font-size:12px">
            <option value="">👤 Cliente general / Sin identificar</option>
          </select>
        </div>
        <div id="pos-cart-items" style="max-height:220px;overflow-y:auto;min-height:80px;padding:8px 0">
          <div id="pos-cart-empty" style="text-align:center;padding:24px;color:var(--gray3);font-size:13px">← Añade productos desde el catálogo</div>
        </div>
        <div style="padding:12px 0;border-top:1px solid var(--ivory-dark)">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
            <label style="font-size:11px;font-weight:600;color:var(--gray3)">DESCUENTO %</label>
            <input type="number" id="pos-desc" min="0" max="100" value="0" onchange="posDescuento=parseInt(this.value||0);posRenderCart()" class="form-control" style="width:70px;padding:6px;font-size:13px">
          </div>
        </div>
        <div id="pos-totales" style="border-top:2px solid var(--gold);padding:12px 0">
          <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--gray2);margin-bottom:4px"><span>Subtotal</span><span id="pos-subtotal">S/ 0.00</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--gray2);margin-bottom:4px"><span>Descuento</span><span id="pos-descuento-val" style="color:#E74C3C">- S/ 0.00</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--gray2);margin-bottom:8px"><span>IGV (18%)</span><span id="pos-igv">S/ 0.00</span></div>
          <div style="display:flex;justify-content:space-between;font-size:22px;font-weight:700"><span>TOTAL</span><span id="pos-total" style="color:var(--gold-dark)">S/ 0.00</span></div>

        <div style="margin-bottom:12px">
          <div style="font-size:11px;font-weight:600;color:var(--gray3);margin-bottom:8px">MÉTODO DE PAGO</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px" id="pos-metodos">
            ${['Efectivo','Yape','Plin','Tarjeta','Transferencia','Mixto'].map(m=>`<button class="btn btn-secondary btn-sm pos-metodo-btn" data-metodo="${m}" onclick="posSelectMetodo('${m}',this)" style="font-size:11px">${m}</button>`).join('')}
          </div>
        </div>
        <div style="margin-bottom:12px">
          <select class="form-control" id="pos-canal" style="font-size:12px">
            <option>POS</option><option>WhatsApp</option><option>Instagram</option><option>TikTok</option><option>Presencial</option>
          </select>
        </div>
        <button class="btn btn-primary btn-lg" onclick="posCobrar()" style="width:100%;background:linear-gradient(135deg,var(--gold-dark),var(--gold));font-size:16px;font-weight:700;letter-spacing:1px">💰 COBRAR</button>

function posSelectMetodo(m,btn){
  posSelectedMetodo=m;
  document.querySelectorAll('.pos-metodo-btn').forEach(b=>{ b.classList.toggle('btn-primary',b===btn); b.classList.toggle('btn-secondary',b!==btn); });
}
function posSetCliente(id){ posCliente=id?parseInt(id):null; }

async function posAddItemById(id){
  const p=await dbGet('productos',id);
  if(!p){ showToast('⚠️ Producto no encontrado','error'); return; }
  posAddItem(p.id,p.nombre,p.precio,p.stock);
}

function posAddItem(id,nombre,precio,stock){
  if(stock===0){ showToast('⚠️ Producto agotado','error'); return; }
  const existing=posCart.find(i=>i.id===id);
  if(existing){ if(existing.qty>=stock){ showToast('⚠️ Stock insuficiente','error'); return; } existing.qty++; }
  else posCart.push({id,nombre,precio,qty:1,stock});
  posRenderCart();
}
function posUpdateQty(id,delta){
  const item=posCart.find(i=>i.id===id); if(!item) return;
  item.qty=Math.max(0,item.qty+delta);
  if(item.qty===0) posCart=posCart.filter(i=>i.id!==id);
  posRenderCart();
}
function posRemoveItem(id){ posCart=posCart.filter(i=>i.id!==id); posRenderCart(); }
function posClearCart(){
  posCart=[]; posCliente=null; posDescuento=0;
  const d=document.getElementById('pos-desc'); if(d) d.value=0;
  const cs=document.getElementById('pos-cliente-sel'); if(cs) cs.value='';
  posRenderCart();
}

function posRenderCart(){
  const container=document.getElementById('pos-cart-items'); if(!container) return;
  if(posCart.length===0){
    container.innerHTML=`<div style="text-align:center;padding:24px;color:var(--gray3);font-size:13px">← Añade productos desde el catálogo</div>`;
  } else {
    container.innerHTML=posCart.map(item=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--ivory-dark)">
      <div style="flex:1;font-size:12px;font-weight:500">${item.nombre}</div>
      <div style="display:flex;align-items:center;gap:4px">
        <button onclick="posUpdateQty(${item.id},-1)" style="width:24px;height:24px;border:1px solid var(--gray5);border-radius:4px;background:var(--ivory);cursor:pointer;font-size:14px">−</button>
        <span style="width:28px;text-align:center;font-weight:600">${item.qty}</span>
        <button onclick="posUpdateQty(${item.id},1)" style="width:24px;height:24px;border:1px solid var(--gray5);border-radius:4px;background:var(--ivory);cursor:pointer;font-size:14px">+</button>
      </div>
      <div style="font-size:13px;font-weight:600;min-width:64px;text-align:right">S/ ${(item.precio*item.qty).toFixed(2)}</div>
      <button onclick="posRemoveItem(${item.id})" style="border:none;background:none;color:#E74C3C;cursor:pointer;font-size:14px">✕</button>
    </div>`).join('');
  }
  const subtotal=posCart.reduce((s,i)=>s+i.precio*i.qty,0);
  const descAmt=subtotal*(posDescuento/100);
  const base=subtotal-descAmt;
  const igv=base*0.18;
  const el=(id,v)=>{ const e=document.getElementById(id); if(e) e.textContent=v; };
  el('pos-subtotal',`S/ ${subtotal.toFixed(2)}`);
  el('pos-descuento-val',`- S/ ${descAmt.toFixed(2)}`);
  el('pos-igv',`S/ ${igv.toFixed(2)}`);
  el('pos-total',`S/ ${base.toFixed(2)}`);
}

function posFilterProducts(q){
  document.querySelectorAll('.pos-prod-card').forEach(card=>{ card.style.display=card.dataset.nombre.includes(q.toLowerCase())?'':'none'; });
}
function posFilterCat(catId,btn){
  document.querySelectorAll('.pos-cat-btn').forEach(b=>b.className='btn btn-secondary btn-sm pos-cat-btn');
  btn.className='btn btn-primary btn-sm pos-cat-btn';
  document.querySelectorAll('.pos-prod-card').forEach(card=>{ card.style.display=(catId===0||card.dataset.cat==catId)?'':'none'; });
}

async function posCobrar(){
  if(posCart.length===0){ showToast('⚠️ El carrito está vacío','error'); return; }
  const subtotal=posCart.reduce((s,i)=>s+i.precio*i.qty,0);
  const descAmt=subtotal*(posDescuento/100);
  const total=subtotal-descAmt;
  const igv=total*0.18;

  for(const item of posCart){
    const p=await dbGet('productos',item.id);
    if(p){ p.stock=Math.max(0,p.stock-item.qty); await dbPut('productos',p); }
  }

  const venta={fecha:new Date().toISOString().split('T')[0],hora:new Date().toLocaleTimeString('es-PE'),clienteId:posCliente,clienteNombre:'Cliente General',items:[...posCart],subtotal,descuento:descAmt,igv,total,metodo:posSelectedMetodo,canal:document.getElementById('pos-canal')?.value||'POS',vendedor:SESSION?.nombre,estado:'completado',marca:MARCA_ACTIVA};

  if(posCliente){
    const cli=await dbGet('clientes',posCliente);
    if(cli){ venta.clienteNombre=cli.nombre; cli.compras++; cli.totalGastado+=total; cli.ultimaCompra=venta.fecha; await dbPut('clientes',cli); }
  }

  await dbPut('ventas',venta);
  await registrarAuditoria('VENTA_POS',`Venta S/ ${total.toFixed(2)} — ${posSelectedMetodo}`);

  openModal('✅ Venta Completada',`
  <div style="text-align:center;padding:20px 0">
    <div style="font-size:48px;margin-bottom:8px">🌸</div>
    <div style="font-family:var(--font-display);font-size:20px;font-weight:700">¡Venta Exitosa!</div>
    <div style="font-size:13px;color:var(--gray3);margin:8px 0">Universo Floral · ${new Date().toLocaleString('es-PE')}</div>
    <div style="background:var(--ivory);border-radius:10px;padding:16px;margin:16px 0;text-align:left">
      ${posCart.map(i=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0"><span>${i.nombre} x${i.qty}</span><span>S/ ${(i.precio*i.qty).toFixed(2)}</span></div>`).join('')}
      <div style="border-top:1px dashed var(--gray4);margin-top:8px;padding-top:8px">
        ${posDescuento>0?`<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--gray3)"><span>Descuento ${posDescuento}%</span><span>-S/ ${descAmt.toFixed(2)}</span></div>`:''}
        <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:700;margin-top:4px"><span>TOTAL</span><span style="color:var(--gold-dark)">S/ ${total.toFixed(2)}</span></div>
        <div style="font-size:12px;color:var(--gray3);margin-top:4px">Método: ${posSelectedMetodo}</div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--gray3)">Gracias por tu preferencia 🌸</div>
  </div>`,
  [{label:'Nueva Venta',class:'btn-primary',action:'closeModal();renderPOS()'}]);

  posClearCart();
}

    <div class="kpi-card"><div class="kpi-label">IGV Total</div><div class="kpi-value"><span class="kpi-currency">S/</span>${(totalMes*0.18).toFixed(2)}</div></div>
  </div>
  <div class="card" style="padding:0"><div class="table-wrapper"><table class="data-table">
    <thead><tr><th>Fecha</th><th>Cliente</th><th>Total</th><th>IGV</th><th>Método</th><th>Canal</th><th>Vendedor</th><th>Estado</th></tr></thead>
    <tbody>${[...ventas].reverse().slice(0,40).map(v=>`<tr>
      <td style="font-size:12px">${v.fecha}</td><td>${v.clienteNombre||'General'}</td>
      <td style="font-weight:700;color:var(--gold-dark)">S/ ${v.total.toFixed(2)}</td>
      <td style="font-size:12px;color:var(--gray3)">S/ ${(v.igv||v.total*0.18).toFixed(2)}</td>
      <td><span class="chip">${v.metodo||'—'}</span></td><td><span class="chip">${v.canal||'—'}</span></td>
      <td style="font-size:12px">${v.vendedor||'—'}</td><td><span class="badge ${getBadgeClass(v.estado)}">${v.estado}</span></td>
    </tr>`).join('')}</tbody>
  </table></div></div>`;
  document.getElementById('page-content').innerHTML=html;
}

function exportarVentas(){
  dbGetAll('ventas').then(ventas=>{
    const csv=['Fecha,Cliente,Total,IGV,Método,Canal,Vendedor,Estado'].concat(ventas.map(v=>`"${v.fecha}","${v.clienteNombre||'General'}",${v.total},${(v.igv||v.total*0.18).toFixed(2)},"${v.metodo||''}","${v.canal||''}","${v.vendedor||''}","${v.estado}"`)).join('\n');
    const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='ventas-universo-floral.csv'; a.click();
    showToast('📥 Ventas exportadas','success');
  });
}

function cotAddItem(){
  const sel=document.getElementById('cot-prod'); const qty=parseInt(document.getElementById('cot-prod-qty').value||1);
  if(!sel.value) return;
  const [id,nombre,precio]=sel.value.split(':');
  const existing=window._cotItems.find(i=>i.id===id);
  if(existing) existing.qty+=qty; else window._cotItems.push({id,nombre,precio:parseFloat(precio),qty});
  cotRenderItems();
}
function cotRenderItems(){
  const el=document.getElementById('cot-items'); if(!el) return;
  if(window._cotItems.length===0){ el.innerHTML=''; const t=document.getElementById('cot-total'); if(t) t.value=''; return; }
  const sub=window._cotItems.reduce((s,i)=>s+i.precio*i.qty,0);
  const desc=sub*(parseInt(document.getElementById('cot-desc-pct')?.value||0)/100);
  const total=sub-desc;
  el.innerHTML=`<div style="border:1px solid var(--gray5);border-radius:8px;overflow:hidden">
    ${window._cotItems.map((i,idx)=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--ivory-dark)">
      <div style="flex:1;font-size:13px">${i.nombre} × ${i.qty}</div><div style="font-weight:600;font-size:13px">S/ ${(i.precio*i.qty).toFixed(2)}</div>
      <button onclick="window._cotItems.splice(${idx},1);cotRenderItems()" style="border:none;background:none;color:#E74C3C;cursor:pointer">✕</button></div>`).join('')}
    <div style="display:flex;justify-content:flex-end;padding:10px 12px;font-weight:700;font-size:15px">TOTAL: S/ ${total.toFixed(2)}</div></div>`;
  document.getElementById('cot-total').value=`S/ ${total.toFixed(2)}`;
}

async function guardarCotizacion(){
  const clienteSel=document.getElementById('cot-cliente')?.value;
  if(!clienteSel){ showToast('⚠️ Selecciona un cliente','error'); return; }
  const [cid,cnombre]=clienteSel.split(':');
  const sub=(window._cotItems||[]).reduce((s,i)=>s+i.precio*i.qty,0);
  const desc=sub*(parseInt(document.getElementById('cot-desc-pct')?.value||0)/100);
  await dbPut('cotizaciones',{clienteId:parseInt(cid),clienteNombre:cnombre,descripcion:document.getElementById('cot-desc')?.value.trim(),items:[...(window._cotItems||[])],fecha:document.getElementById('cot-fecha')?.value,validaHasta:document.getElementById('cot-valida')?.value,total:sub-desc,descuento:desc,notas:document.getElementById('cot-notas')?.value.trim(),estado:'pendiente',marca:MARCA_ACTIVA,creadoEn:new Date().toISOString()});
  closeModal(); showToast('✅ Cotización creada','success'); renderCotizaciones();
}

async function verCotizacion(id){
  const c=await dbGet('cotizaciones',id); if(!c) return;
  openModal(`📋 Cotización #${c.id}`,`
  <p style="font-size:13px"><strong>${c.clienteNombre}</strong> — ${c.descripcion||''}</p>
  <div class="divider"></div>
  ${(c.items||[]).map(i=>`<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px"><span>${i.nombre} × ${i.qty}</span><span>S/ ${(i.precio*i.qty).toFixed(2)}</span></div>`).join('')}
  <div class="divider"></div>
  <div style="display:flex;justify-content:space-between;font-weight:700;font-size:16px"><span>TOTAL</span><span>S/ ${c.total.toFixed(2)}</span></div>

  [{label:'Cerrar',class:'btn-secondary',action:'closeModal()'}]);
}

async function convertirCotizacion(id){
  const cot=await dbGet('cotizaciones',id); if(!cot) return;
  cot.estado='convertida';
  await dbPut('cotizaciones',cot);
  await dbPut('pedidos',{clienteId:cot.clienteId,clienteNombre:cot.clienteNombre,productos:cot.items.map(i=>({pid:parseInt(i.id),nombre:i.nombre,qty:i.qty,precio:i.precio})),total:cot.total,estado:'confirmado',fecha:new Date().toISOString().split('T')[0],entrega:cot.validaHasta||'',canal:'Cotización',notas:cot.notas,delivery:false,marca:MARCA_ACTIVA});
  await registrarAuditoria('COT_CONVERTIDA',`Cotización #${id} → Pedido`);
  showToast('✅ Cotización convertida en pedido','success'); renderCotizaciones();
}

async function eliminarCotizacion(id){
  if(!confirm('¿Eliminar esta cotización?')) return;
  await dbDelete('cotizaciones',id);
  showToast('🗑️ Cotización eliminada','info'); renderCotizaciones();
}

async function guardarMovimiento(tipo){
  const concepto=document.getElementById('mov-concepto')?.value.trim();
  const monto=parseFloat(document.getElementById('mov-monto')?.value||0);
  if(!concepto||monto<=0){ showToast('⚠️ Completa concepto y monto válido','error'); return; }
  await dbPut('finanzas',{tipo,concepto,monto,fecha:document.getElementById('mov-fecha')?.value,categoria:document.getElementById('mov-categoria')?.value,centroCosto:document.getElementById('mov-centro')?.value,marca:MARCA_ACTIVA,creadoEn:new Date().toISOString()});
  await registrarAuditoria('MOVIMIENTO_FINANCIERO',`${tipo}: ${concepto} — S/ ${monto.toFixed(2)}`);
  closeModal(); showToast(`✅ ${tipo==='ingreso'?'Ingreso':'Egreso'} registrado`,'success'); renderFinanzas();
}

/* ═══════════════════════════════════════════
   CENTROS DE COSTOS (vista integrada en Reportes)
═══════════════════════════════════════════ */
async function getCentrosCostoData(){
  const finanzas=await dbGetAll('finanzas');
  const centros={};
  finanzas.forEach(f=>{
    const c=f.centroCosto||'Sin asignar';
    if(!centros[c]) centros[c]={ingreso:0,egreso:0};
    centros[c][f.tipo]+=f.monto;
  });
  return centros;
}

function repTab(tab,btn){

let imgEditorState={ image:null, rotation:0 };
function initImgEditor(src){
  const canvas=document.getElementById('img-editor-canvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const image=new Image();
  image.onload=()=>{
    imgEditorState.image=image;
    imgEditorState.rotation=0;
    const maxW=480;
    const scale=Math.min(1,maxW/image.width);
    canvas.width=image.width*scale;
    canvas.height=image.height*scale;
    dibujarImagenEditor();
  };
  image.src=src;
}
function dibujarImagenEditor(){
  const canvas=document.getElementById('img-editor-canvas'); if(!canvas||!imgEditorState.image) return;
  const ctx=canvas.getContext('2d');
  const brillo=document.getElementById('ie-brillo')?.value||100;
  const contraste=document.getElementById('ie-contraste')?.value||100;
  const saturacion=document.getElementById('ie-saturacion')?.value||100;
  ctx.save();
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.filter=`brightness(${brillo}%) contrast(${contraste}%) saturate(${saturacion}%)`;
  ctx.translate(canvas.width/2,canvas.height/2);
  ctx.rotate(imgEditorState.rotation*Math.PI/180);
  const w=imgEditorState.rotation%180===0?canvas.width:canvas.height;
  const h=imgEditorState.rotation%180===0?canvas.height:canvas.width;
  ctx.drawImage(imgEditorState.image,-w/2,-h/2,w,h);
  ctx.restore();
}
function aplicarFiltrosImagen(){ dibujarImagenEditor(); }
function rotarImagen(deg){ imgEditorState.rotation=(imgEditorState.rotation+deg+360)%360; dibujarImagenEditor(); }

async function guardarEdicionImagen(id){
  const img=await dbGet('imagenes',id); if(!img) return;
  const nuevoInput=document.getElementById('ie-input');
  if(nuevoInput?.files[0]){
    img.data=await fileToBase64(nuevoInput.files[0]);
  } else {
    const canvas=document.getElementById('img-editor-canvas');
    if(canvas) img.data=canvas.toDataURL('image/png');
  }
  img.nombre=document.getElementById('ie-nombre')?.value.trim()||img.nombre;
  await dbPut('imagenes',img);
  if(img.productoId){
    const prod=await dbGet('productos',img.productoId);
    if(prod){ prod.imagen=img.data; await dbPut('productos',prod); }
  }
  await registrarAuditoria('IMAGEN_EDITADA',`Imagen editada: ${img.nombre}`);
  closeModal(); showToast('✅ Imagen actualizada','success'); renderBiblioteca();
}

async function eliminarImagen(id){
  const img=await dbGet('imagenes',id);
  if(!confirm('¿Eliminar esta imagen de la biblioteca?')) return;
  if(img?.productoId){
    const prod=await dbGet('productos',img.productoId);
    if(prod){ prod.imagen=null; await dbPut('productos',prod); }
  }
  await dbDelete('imagenes',id);
  await registrarAuditoria('IMAGEN_ELIMINADA',`Imagen eliminada: ${img?.nombre||id}`);
  showToast('🗑️ Imagen eliminada','info'); renderBiblioteca();
}

      <div style="display:flex;align-items:center;gap:10px;font-size:13px"><span class="badge badge-success">✓</span> Arquitectura preparada para sincronización en la nube</div>

async function generarBackupCompleto(){
  const backup={meta:{sistema:'Universo Floral ERP Enterprise',version:'1.0',fecha:new Date().toISOString(),marca:MARCA_ACTIVA},data:{}};
  for(const s of STORES) backup.data[s]=await dbGetAll(s);

  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`backup-universo-floral-${new Date().toISOString().split('T')[0]}.json`;
  a.click();

  LS.set('lastBackup',new Date().toLocaleString('es-PE'));
  await registrarAuditoria('BACKUP_GENERADO','Backup completo del sistema generado y descargado');
  showToast('💾 Backup completo descargado correctamente','success');
  renderBackups();
}

async function restaurarBackup(input){
  if(!input.files[0]) return;
  if(!confirm('⚠️ Esto reemplazará TODOS los datos actuales del sistema con los del backup. ¿Continuar?')) { input.value=''; return; }

  try{
    const text=await input.files[0].text();
    const backup=JSON.parse(text);
    if(!backup.data){ showToast('⚠️ Archivo de backup inválido','error'); return; }

    for(const store of STORES){
      if(!backup.data[store]) continue;
      const tx=db.transaction(store,'readwrite');
      const os=tx.objectStore(store);
      await new Promise((res)=>{ const clearReq=os.clear(); clearReq.onsuccess=res; });
      for(const item of backup.data[store]){ await dbPut(store,item); }
    }

    await registrarAuditoria('BACKUP_RESTAURADO',`Sistema restaurado desde backup: ${backup.meta?.fecha||'fecha desconocida'}`);
    showToast('✅ Backup restaurado correctamente. Recargando...','success');
    setTimeout(()=>location.reload(),1500);
  }catch(e){
    showToast('❌ Error al restaurar el backup: archivo inválido','error');
  }
}

async function modalCambiarPassword(){
  openModal('🔒 Cambiar Contraseña',`
  <div class="form-group"><label class="form-label">Contraseña Actual</label><input class="form-control" id="pw-actual" type="password" placeholder="••••••"></div>
  <div class="form-group"><label class="form-label">Nueva Contraseña</label><input class="form-control" id="pw-nueva" type="password" placeholder="Mínimo 6 caracteres"></div>
  <div class="form-group"><label class="form-label">Confirmar Nueva Contraseña</label><input class="form-control" id="pw-confirmar" type="password" placeholder="Repite la nueva contraseña"></div>
  <p style="font-size:11px;color:var(--gray3)">Nota: en esta versión de demostración, el cambio de contraseña se registra en auditoría pero no persiste entre sesiones (los usuarios son de prueba).</p>`,
  [{label:'Actualizar Contraseña',class:'btn-primary',action:'cambiarPassword()'},{label:'Cancelar',class:'btn-secondary',action:'closeModal()'}]);
}

async function cambiarPassword(){
  const actual=document.getElementById('pw-actual')?.value;
  const nueva=document.getElementById('pw-nueva')?.value;
  const confirmar=document.getElementById('pw-confirmar')?.value;
  const usuarioActual=USUARIOS_DEMO.find(u=>u.usuario===SESSION.usuario);

  if(!actual||actual!==usuarioActual?.clave){ showToast('⚠️ La contraseña actual no es correcta','error'); return; }
  if(!nueva||nueva.length<6){ showToast('⚠️ La nueva contraseña debe tener mínimo 6 caracteres','error'); return; }
  if(nueva!==confirmar){ showToast('⚠️ Las contraseñas no coinciden','error'); return; }

  await registrarAuditoria('PASSWORD_CAMBIADO','El usuario actualizó su contraseña');
  closeModal(); showToast('✅ Contraseña actualizada correctamente','success'); renderPerfil();
}
